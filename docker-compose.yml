services:
  # PHP-FPM Application
  app:
    build: .
    container_name: siopk-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-siopk.ini:ro
    networks:
      - siopk-net
    depends_on:
      - mysql
      - redis
    environment:
      - COMPOSER_MEMORY_LIMIT=-1

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: siopk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - siopk-net
    depends_on:
      - app

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: siopk-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-siopk_badung}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/99-siopk.cnf:ro
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - siopk-net

  # Redis (Session + Cache)
  redis:
    image: redis:7-alpine
    container_name: siopk-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - siopk-net

  # Queue Worker
  worker:
    build: .
    container_name: siopk-worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-siopk.ini:ro
    networks:
      - siopk-net
    depends_on:
      - mysql
      - redis

  # Task Scheduler
  scheduler:
    image: php:8.3-cli
    container_name: siopk-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-siopk.ini:ro
    networks:
      - siopk-net
    depends_on:
      - mysql
      - redis

networks:
  siopk-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
